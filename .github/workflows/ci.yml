name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.build_type }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build_type:
          - Debug
          - Release

    env:
      BUILD_DIR: build-${{ matrix.build_type }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            clang-tidy \
            g++ \
            libboost-all-dev \
            libqt6charts6-dev \
            ninja-build \
            python3-dev \
            python3-pip \
            qt6-base-dev

      - name: Install Python dependencies
        run: python -m pip install pybind11-stubgen

      - name: Configure
        run: cmake -S . -B "$BUILD_DIR" -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build "$BUILD_DIR"

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir "$BUILD_DIR" --output-on-failure
